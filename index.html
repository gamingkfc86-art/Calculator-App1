<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iPhone Calculator Pro</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: -apple-system, Arial;
}

.calculator {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 🔥 TOP AREA CONTROL */
.top-area {
  height: 140px; /* 🔥 fixed small */
  padding-top: 30px;
  display: flex;
}

/* 🔥 HISTORY SMALL */
.history {
  width: 50%;
  color: #ccc;
  font-size: 14px;
  height: 100px; /* 🔥 reduced */
  overflow-y: auto;
  padding: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  margin-left: 10px;
}

/* 🔥 DISPLAY FIX */
#display {
  width: 100%;
  height: 80px;
  font-size: 42px;
  text-align: right;
  padding: 15px;
  border: none;
  background: black;
  color: white;
  box-sizing: border-box;
}

/* 🔥 BUTTON AREA FIX */
.buttons {
  flex: 1; /* 🔥 takes remaining space */
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  padding: 15px;
}

/* Buttons */
button {
  height: 70px;
  border-radius: 50%;
  font-size: 24px;
  border: none;
  color: white;
  background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
  box-shadow: 4px 4px 10px rgba(0,0,0,0.6);
}

button:active {
  transform: scale(0.92);
}

.ac {
  background: linear-gradient(145deg, #ff4d4d, #d50000);
}

.gray {
  background: linear-gradient(145deg, #d4d4d4, #a5a5a5);
  color: black;
}

.orange {
  background: linear-gradient(145deg, #ffb347, #ff9500);
}

.dark {
  background: linear-gradient(145deg, #3a3a3a, #1f1f1f);
}

.zero {
  grid-column: span 2;
  border-radius: 35px;
  text-align: left;
  padding-left: 25px;
}

/* Top buttons */
.toggleHistory {
  position: absolute;
  top: 10px;
  left: 15px;
  font-size: 12px;
  background: #444;
  padding: 5px 10px;
  border-radius: 10px;
}

.vibrationToggle {
  position: absolute;
  top: 10px;
  right: 80px;
  font-size: 12px;
  background: #222;
  color: white;
  padding: 5px 10px;
  border-radius: 10px;
}

.clearHistory {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 12px;
  background: red;
  padding: 5px 10px;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="calculator">

  <button class="toggleHistory" onclick="toggleHistory()">📂</button>
  <button class="vibrationToggle" onclick="toggleVibration()" id="vibBtn">📳 ON</button>
  <button class="clearHistory" onclick="clearHistory()">Clear</button>

  <div class="top-area">
    <div class="history" id="history"></div>
  </div>

  <input type="text" id="display" disabled>

  <div class="buttons">
    <button class="ac" onclick="clearDisplay()">AC</button>
    <button class="gray" onclick="plusMinus()">±</button>
    <button class="gray" onclick="append('%')">%</button>
    <button class="orange" onclick="append('/')">÷</button>

    <button class="dark" onclick="append('7')">7</button>
    <button class="dark" onclick="append('8')">8</button>
    <button class="dark" onclick="append('9')">9</button>
    <button class="orange" onclick="append('*')">×</button>

    <button class="dark" onclick="append('4')">4</button>
    <button class="dark" onclick="append('5')">5</button>
    <button class="dark" onclick="append('6')">6</button>
    <button class="orange" onclick="append('-')">−</button>

    <button class="dark" onclick="append('1')">1</button>
    <button class="dark" onclick="append('2')">2</button>
    <button class="dark" onclick="append('3')">3</button>
    <button class="orange" onclick="append('+')">+</button>

    <button class="dark zero" onclick="append('0')">0</button>
    <button class="dark" onclick="append('.')">.</button>
    <button class="orange" onclick="calculate()">=</button>
  </div>

</div>

<script>
let display = document.getElementById("display");

function append(val) {
  display.value += val;
}

function clearDisplay() {
  display.value = "";
}

function calculate() {
  try {
    display.value = eval(display.value);
  } catch {
    display.value = "Error";
  }
}

function plusMinus() {
  if(display.value) {
    display.value = eval(display.value) * -1;
  }
}

function toggleHistory(){}
function toggleVibration(){}
function clearHistory(){}
</script>

</body>
</html>
